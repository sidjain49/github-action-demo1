name: CI 

on:
  push:
    branches:
      - main
      - features/**'


permissions:
  contents: read
  id-token: write


jobs:
   terraorm resource:
      name: resource group creation

      steps:
     - name: checkout
       uses: actions/checkout@v7.0.0
     - name: Azure Login
       uses: Azure/login@v3   
       with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: Terraform Init
        run: terraform init
        working-directory: ./infra/dev/provide.tf
    -  name: terraform validate
         run: terraform validate
         
          
         
       
     

     
